<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Regalo Especial 🌻</title>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #mensaje { position: absolute; bottom: 30px; color: #fff; text-align: center; opacity: 0; transition: opacity 3s; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); width: 100%; }
    </style>
</head>
<body>
    <canvas id="paisajeCanvas"></canvas>
    <div id="mensaje">
        <h2>Un ramo eterno, de un gatito tímido...</h2>
        <p>// 21 de Marzo // Code with love</p>
    </div>

    <script>
        const canvas = document.getElementById('paisajeCanvas');
        const ctx = canvas.getContext('2d');
        const mensaje = document.getElementById('mensaje');

        function ajustarLienzo() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        ajustarLienzo();
        window.addEventListener('resize', ajustarLienzo);

        let tiempo = 0;

        function dibujarCieloYPrado() {
            const gradCielo = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7);
            gradCielo.addColorStop(0, "#87CEEB");
            gradCielo.addColorStop(1, "#E0F7FA");
            ctx.fillStyle = gradCielo;
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.7);

            const gradPrado = ctx.createLinearGradient(0, canvas.height * 0.7, 0, canvas.height);
            gradPrado.addColorStop(0, "#32CD32");
            gradPrado.addColorStop(1, "#228B22");
            ctx.fillStyle = gradPrado;
            ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);
        }

        function dibujarGatito(x, y) {
            ctx.save();
            ctx.translate(x, y + 100); // Subir un poco desde el fondo de la pantalla

            // OREJAS
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.moveTo(-60, -50); ctx.lineTo(-80, -100); ctx.lineTo(-30, -70); ctx.fill(); // Izq
            ctx.moveTo(60, -50); ctx.lineTo(80, -100); ctx.lineTo(30, -70); ctx.fill(); // Der
            
            // CABEZA (Chibi)
            ctx.beginPath();
            ctx.ellipse(0, 0, 80, 70, 0, 0, Math.PI * 2);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();
            ctx.strokeStyle = "#DDD"; ctx.stroke();

            // OJOS (Cerrados con pena)
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(-30, 0, 10, Math.PI, 0); // Ojo izq ^
            ctx.arc(30, 0, 10, Math.PI, 0);  // Ojo der ^
            ctx.stroke();

            // SONROJO (Vergüenza)
            ctx.fillStyle = "rgba(255, 182, 193, 0.6)";
            ctx.beginPath();
            ctx.arc(-45, 15, 12, 0, Math.PI * 2);
            ctx.arc(45, 15, 12, 0, Math.PI * 2);
            ctx.fill();

            // NARIZ Y BOCA
            ctx.beginPath();
            ctx.moveTo(-5, 10); ctx.lineTo(0, 15); ctx.lineTo(5, 10);
            ctx.stroke();

            // PATITAS (Sosteniendo el ramo)
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.arc(-30, 50, 20, 0, Math.PI * 2);
            ctx.arc(30, 50, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function dibujarFlor(x, y, escala) {
            const petalos = 10;
            const radio = 45 * escala;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.sin(tiempo + x) * 0.05);
            ctx.fillStyle = "#FFD700";
            ctx.strokeStyle = "#DAA520";
            for (let i = 0; i < petalos; i++) {
                ctx.save();
                ctx.rotate((i * Math.PI * 2) / petalos);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-radio/2, -radio/2, -radio/1.5, -radio*1.2, 0, -radio*1.2);
                ctx.bezierCurveTo(radio/1.5, -radio*1.2, radio/2, -radio/2, 0, 0);
                ctx.fill(); ctx.stroke();
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(0, 0, 12 * escala, 0, Math.PI * 2);
            ctx.fillStyle = "#8B4513"; ctx.fill();
            ctx.restore();
        }

        function dibujarRamo(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // TALLOS
            ctx.strokeStyle = "#228B22";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, 100); ctx.lineTo(-70, -60);
            ctx.moveTo(0, 100); ctx.lineTo(70, -60);
            ctx.moveTo(0, 100); ctx.lineTo(0, -90);
            ctx.stroke();

            // LAZO
            ctx.fillStyle = "#FF69B4";
            ctx.beginPath();
            ctx.arc(0, 130, 15, 0, Math.PI * 2);
            ctx.ellipse(-20, 130, 20, 10, Math.PI/4, 0, Math.PI * 2);
            ctx.ellipse(20, 130, 20, 10, -Math.PI/4, 0, Math.PI * 2);
            ctx.fill();

            // FLORES
            dibujarFlor(0, 0, 1.2);
            dibujarFlor(-60, -40, 1.1);
            dibujarFlor(60, -40, 1.1);
            dibujarFlor(-35, -90, 1.0);
            dibujarFlor(35, -90, 1.0);
            dibujarFlor(0, -110, 0.9);

            ctx.restore();
        }

        function animar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            tiempo += 0.01;
            dibujarCieloYPrado();

            const cx = canvas.width / 2;
            const cy = canvas.height * 0.6;

            // Movimiento de vergüenza (pequeño temblor)
            const tremorX = Math.sin(tiempo * 10) * 2;

            ctx.save();
            ctx.translate(cx + tremorX, cy);
            dibujarGatito(0, 50);
            dibujarRamo(0, 0);
            ctx.restore();

            if (tiempo > 1.5) mensaje.style.opacity = 1;
            requestAnimationFrame(animar);
        }
        animar();
    </script>
</body>
</html>
