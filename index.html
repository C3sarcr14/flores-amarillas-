<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Danielita🌻</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #e6f7ff, #fff); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(0,0,0,0.1)); }
        #mensaje { position: absolute; top: 15%; color: #333; text-align: center; opacity: 0; transition: opacity 3s; width: 100%; text-shadow: 1px 1px 3px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; margin: 0; color: #ffeb3b; -webkit-text-stroke: 1px #d32f2f; }
    </style>
</head>
<body>
    <canvas id="memeCanvas"></canvas>
    <div id="mensaje">
        <h1>para ti mibida 🫶🏻</h1>
        <p> ATTE: Julian ;) </p>
    </div>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const mensaje = document.getElementById('mensaje');

        function ajustarLienzo() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        ajustarLienzo();
        window.addEventListener('resize', ajustarLienzo);

        let tiempo = 0;

        // --- FUNCIÓN DE DIBUJO DEL GATITO ATIGRADO ---

        function dibujarGatitoEstiloMeme(x, y) {
            ctx.save();
            ctx.translate(x, y + canvas.height * 0.1);

            // 1. CABEZA (Chibi, Atigrada)
            ctx.beginPath();
            ctx.ellipse(0, 0, 100, 90, 0, 0, Math.PI * 2);
            // Color base crema/dorado
            ctx.fillStyle = "#F3E5AB";
            ctx.fill();
            ctx.strokeStyle = "#DDD"; ctx.stroke();

            // Patrón Atigrado (Stripes) - Usando gradientes
            ctx.fillStyle = "rgba(139, 69, 19, 0.4)"; // Marrón suave
            for(let i=-2; i<=2; i++){
                ctx.fillRect(i*25 - 5, -90, 10, 30); // Rayas en la frente
            }
            ctx.fillRect(-100, -20, 30, 10); ctx.fillRect(70, -20, 30, 10); // Lados

            // 2. OREJAS
            ctx.fillStyle = "#F3E5AB";
            ctx.beginPath();
            ctx.moveTo(-70, -60); ctx.lineTo(-90, -110); ctx.lineTo(-40, -80); ctx.fill(); // Izq
            ctx.moveTo(70, -60); ctx.lineTo(90, -110); ctx.lineTo(40, -80); ctx.fill(); // Der
            ctx.fillStyle = "#FFC0CB"; // Rosa interior
            ctx.beginPath(); ctx.moveTo(-70, -60); ctx.lineTo(-80, -90); ctx.lineTo(-50, -75); ctx.fill();
            ctx.beginPath(); ctx.moveTo(70, -60); ctx.lineTo(80, -90); ctx.lineTo(50, -75); ctx.fill();

            // 3. OJOS GIGANTES (El secreto de la ternura de Image 0)
            const dibujarOjo = (ox, oy) => {
                ctx.save();
                ctx.translate(ox, oy);
                // Iris (muy grande y oscuro)
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                const gradIris = ctx.createRadialGradient(0, 0, 5, 0, 0, 25);
                gradIris.addColorStop(0, "#1a1a1a");
                gradIris.addColorStop(1, "#000");
                ctx.fillStyle = gradIris;
                ctx.fill();
                // Reflejos (Sparkles)
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(-10, -10, 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, 10, 4, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            };
            dibujarOjo(-40, -10); // Izq
            dibujarOjo(40, -10);  // Der

            // 4. SONROJO (Pena/Vergüenza)
            ctx.fillStyle = "rgba(255, 182, 193, 0.5)";
            ctx.beginPath(); ctx.arc(-60, 20, 15, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(60, 20, 15, 0, Math.PI * 2); ctx.fill();

            // 5. NARIZ Y BOCA (Pequeña y linda)
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-8, 15); ctx.lineTo(0, 22); ctx.lineTo(8, 15); ctx.stroke();
            // Boca tímida w
            ctx.beginPath(); ctx.arc(-4, 25, 4, 0, Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.arc(4, 25, 4, 0, Math.PI); ctx.stroke();

            // 6. PATITAS (Sosteniendo el ramo)
            ctx.fillStyle = "#F3E5AB"; ctx.strokeStyle="#AAA"; ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(-40, 60, 25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(40, 60, 25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

            ctx.restore();
        }

        function dibujarFlor(x, y, escala) {
            const petalos = 10;
            const radio = 40 * escala;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.sin(tiempo + x) * 0.05);
            ctx.fillStyle = "#FFD700"; // Amarillo oro (Image 0)
            ctx.strokeStyle = "#DAA520";
            for (let i = 0; i < petalos; i++) {
                ctx.save();
                ctx.rotate((i * Math.PI * 2) / petalos);
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(-radio/2, -radio/2, -radio/1.5, -radio*1.2, 0, -radio*1.2); ctx.bezierCurveTo(radio/1.5, -radio*1.2, radio/2, -radio/2, 0, 0); ctx.fill(); ctx.stroke(); ctx.restore();
            }
            ctx.beginPath(); ctx.arc(0, 0, 12 * escala, 0, Math.PI * 2); ctx.fillStyle = "#8B4513"; ctx.fill();
            ctx.restore();
        }

        function dibujarRamo(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = "#228B22"; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, 100); ctx.lineTo(-70, -60); ctx.moveTo(0, 100); ctx.lineTo(70, -60); ctx.moveTo(0, 100); ctx.lineTo(0, -90); ctx.stroke();
            ctx.fillStyle = "#FF69B4"; ctx.beginPath(); ctx.arc(0, 130, 15, 0, Math.PI * 2); ctx.ellipse(-20, 130, 20, 10, Math.PI/4, 0, Math.PI * 2); ctx.ellipse(20, 130, 20, 10, -Math.PI/4, 0, Math.PI * 2); ctx.fill();
            
            // Flores agrupadas (Intentando imitar la forma de Image 0)
            dibujarFlor(0, 0, 1.3); // Central
            dibujarFlor(-65, -45, 1.2); // Izq
            dibujarFlor(65, -45, 1.2);  // Der
            dibujarFlor(-35, -100, 1.1); // Arriba Izq
            dibujarFlor(35, -100, 1.1);  // Arriba Der
            dibujarFlor(0, -130, 1.0);   // Cima
            ctx.restore();
        }

        function animar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            tiempo += 0.01;

            const cx = canvas.width / 2;
            const cy = canvas.height * 0.55;
            // Movimiento de vergüenza (temblor)
            const tremorX = Math.sin(tiempo * 15) * 1.5;

            ctx.save();
            ctx.translate(cx + tremorX, cy);
            dibujarGatitoEstiloMeme(0, 50);
            dibujarRamo(0, 0); // El ramo queda sobre las patas
            ctx.restore();

            if (tiempo > 1.0) mensaje.style.opacity = 1;
            requestAnimationFrame(animar);
        }
        animar();
    </script>
</body>
</html>
