<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramo Digital Animado 🌻</title>
    <style>
        body { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        canvas { filter: drop-shadow(0 0 10px rgba(255, 255, 0, 0.2)); }
        #mensaje { position: absolute; bottom: 50px; color: #FFD700; text-align: center; opacity: 0; transition: opacity 3s; text-shadow: 0 0 10px #FFD700; width: 100%; }
    </style>
</head>
<body>
    <canvas id="florCanvas"></canvas>
    <div id="mensaje">
        <h2>Flores amarillas infinitas para ti</h2>
        <p>// 21 de Marzo // Ejecución completada con éxito</p>
    </div>

    <script>
        const canvas = document.getElementById('florCanvas');
        const ctx = canvas.getContext('2d');
        const mensaje = document.getElementById('mensaje');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let tiempo = 0;
        let floresDibujadas = 0;
        const totalFlores = 7;
        const particulas = [];

        // Clase para los brillos (polen)
        class Particula {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random();
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particulas.push(new Particula());

        function dibujarFlor(x, y, escala, oscilacion) {
            const petalos = 12;
            const radio = 60 * escala;
            
            ctx.save();
            ctx.translate(x + Math.sin(tiempo + oscilacion) * 10, y); // Movimiento suave
            
            // Tallo
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(20, 100, 0, 400);
            ctx.strokeStyle = "green";
            ctx.lineWidth = 4;
            ctx.stroke();

            // Pétalos
            for (let i = 0; i < petalos; i++) {
                ctx.save();
                ctx.rotate((i * Math.PI * 2) / petalos + Math.sin(tiempo * 0.5) * 0.05);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-radio/2, -radio/2, -radio/2, -radio*1.5, 0, -radio*1.5);
                ctx.bezierCurveTo(radio/2, -radio*1.5, radio/2, -radio/2, 0, 0);
                ctx.fillStyle = "#FFD700";
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            // Centro
            ctx.beginPath();
            ctx.arc(0, 0, 15 * escala, 0, Math.PI * 2);
            ctx.fillStyle = "#5c3317";
            ctx.fill();
            ctx.restore();
        }

        function animar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            tiempo += 0.02;

            particulas.forEach(p => { p.update(); p.draw(); });

            // Dibujamos el ramo
            dibujarFlor(canvas.width/2, canvas.height/2.5, 1.2, 0);
            dibujarFlor(canvas.width/2 - 120, canvas.height/2.2, 0.9, 1);
            dibujarFlor(canvas.width/2 + 120, canvas.height/2.2, 0.9, 2);
            dibujarFlor(canvas.width/2 - 70, canvas.height/3, 0.7, 3);
            dibujarFlor(canvas.width/2 + 70, canvas.height/3, 0.7, 4);

            if (tiempo > 2) mensaje.style.opacity = 1;

            requestAnimationFrame(animar);
        }

        animar();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
